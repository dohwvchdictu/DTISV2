services:
  app:
    build: .
    image: dtisv2-app
    pull_policy: build
    restart: unless-stopped
    # Not exposed to the host directly - the "proxy" service terminates
    # HTTPS on 80/443 and forwards here over the internal network.
    env_file: .env.docker
    # Makes host.docker.internal resolve to the host on plain Linux Docker
    # (Docker Desktop provides it automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Only 2 vCPUs total on this VM. cpu_shares is a relative priority (not a
    # hard cap) that only kicks in once the CPU is saturated; cpus is a hard
    # ceiling so no single container can starve the rest even when idle.
    # PHP-FPM workers are the second-heaviest service after MySQL for memory.
    cpu_shares: 1536
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 4G

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/dtis.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    cpu_shares: 512
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  db:
    image: mysql:8.0
    restart: unless-stopped
    # MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD / MYSQL_ROOT_PASSWORD
    # come from .env.docker and must match the DB_* values there.
    env_file: .env.docker
    # --- MySQL tuning for a 16GB VM ---
    # innodb-buffer-pool-size: keeps hot tables/indexes in RAM instead of
    #   grinding the disk & CPU. Default is a tiny 128M. 4G is a safe share
    #   of 16GB (raise toward 6G only if PHP isn't memory-hungry).
    # innodb-log-file-size: larger redo log => fewer flushes under write load.
    # innodb-flush-log-at-trx-commit=2: big I/O/CPU win; risks up to ~1s of
    #   transactions on a host crash. Remove this line if you need strict
    #   per-transaction durability.
    # max-connections: headroom for PHP-FPM workers + phpMyAdmin.
    command: >
      --innodb-buffer-pool-size=4G
      --innodb-log-file-size=1G
      --innodb-flush-log-at-trx-commit=2
      --max-connections=200
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=1
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Highest priority - the most latency-sensitive service under contention.
    cpu_shares: 2048
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 6G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Cap Redis memory and evict least-recently-used keys when full, so it
    # can safely absorb sessions/cache/queues moved off MySQL.
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    cpu_shares: 512
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 512M
      MEMORY_LIMIT: 512M
      MAX_EXECUTION_TIME: 600
    ports:
      - "${PHPMYADMIN_PORT:-8085}:80"
    depends_on:
      - db
    # Lowest priority - only used occasionally for admin tasks.
    cpu_shares: 256
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  app-storage:
  db-data:
  redis-data:
