services:
  app:
    build: .
    image: dtisv2-app
    pull_policy: build
    restart: unless-stopped
    ports:
      - "${APACHE_PORT:-80}:80"
    env_file: .env.docker
    # Makes host.docker.internal resolve to the host on plain Linux Docker
    # (Docker Desktop provides it automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mysql:8.0
    restart: unless-stopped
    # MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD / MYSQL_ROOT_PASSWORD
    # come from .env.docker and must match the DB_* values there.
    env_file: .env.docker
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
    ports:
      - "${PHPMYADMIN_PORT:-8085}:80"
    depends_on:
      - db

volumes:
  app-storage:
  db-data:
  redis-data:
