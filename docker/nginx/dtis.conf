# Reverse proxy for DTIS v2 - terminates TLS and forwards to the app container.
# Certificate files are expected in docker/nginx/certs/ (mounted read-only).

server {
    listen 80;
    server_name dtis.dohwv.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name dtis.dohwv.net;

    ssl_certificate     /etc/nginx/certs/dtis.crt;
    ssl_certificate_key /etc/nginx/certs/dtis.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Match the PHP upload limits
    client_max_body_size 512M;

    location / {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }
}
